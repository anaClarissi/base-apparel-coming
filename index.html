<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Base Apparel coming soon page</title>

  <link rel="stylesheet" href="src/css/style.css">

</head>
<body>

  <main class="container">

    <header class="template_content_header_mobile">

      <img src="src/images/logo.svg" alt="Logo" class="logo_img">

    </header>

    <section class="template">

      <section class="template_content">

        <img src="src/images/bg-pattern-desktop.svg" alt="" class="content_bg">

        <article class="template_content_main">

          <header class="template_content_header">

            <img src="src/images/logo.svg" alt="Logo" class="logo_img">

          </header>

          <h1><span>We're</span> coming soon</h1>

          <p>
            Hello fellow shoppers! We're currently building our new fashion store.
            Add your email below to stay up-to-date with announcements and our launch deals.
          </p>

          <form action="">

            <input type="email" name="email" id="email" placeholder="Email Address">

            <button type="button" id="submit-email-btn"><img src="src/images/icon-arrow.svg" alt="icon-arrow" class="icon-arrow"></button>

            <p id="msg-erro">Please provide a valid email</p>

            <img src="src/images/icon-error.svg" alt="" class="invalid-icon">

          </form>

        </article>
        
      </section>

      <section class="template_img">

      </section>

    </section>

  </main>

  <script src="src/js/script.js"></script>
  
</body>
</html>
